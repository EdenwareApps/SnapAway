name: Community Mode Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify-community:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify open-core
        run: npm run verify:open-core

      - name: Verify community build
        run: npm run build
